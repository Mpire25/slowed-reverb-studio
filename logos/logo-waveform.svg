<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#12101f"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cbf"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cbf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>

  <!-- Stretched waveform bars — left side compressed, right side stretched/slow -->
  <!-- Each bar: x, centerY=200, half-height -->
  <g filter="url(#glow)">
    <!-- Compressed (fast) left side -->
    <rect x="36"  y="183" width="5" height="34"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="45"  y="172" width="5" height="56"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="54"  y="188" width="5" height="24"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="63"  y="162" width="5" height="76"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="72"  y="180" width="5" height="40"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="81"  y="174" width="5" height="52"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="90"  y="186" width="5" height="28"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="99"  y="168" width="5" height="64"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="108" y="183" width="5" height="34"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="117" y="176" width="5" height="48"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="126" y="165" width="5" height="70"  rx="2.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="135" y="184" width="5" height="32"  rx="2.5" fill="url(#wave)" opacity="0.9"/>

    <!-- Transition zone, bars getting wider and taller -->
    <rect x="148" y="174" width="7" height="52"  rx="3" fill="url(#wave)" opacity="0.95"/>
    <rect x="160" y="160" width="8" height="80"  rx="3" fill="url(#wave)" opacity="0.95"/>
    <rect x="174" y="178" width="9" height="44"  rx="3.5" fill="url(#wave)" opacity="0.95"/>

    <!-- Stretched (slow) right side — fewer, wider, taller bars -->
    <rect x="192" y="155" width="13" height="90"  rx="4" fill="url(#wave)"/>
    <rect x="214" y="170" width="13" height="60"  rx="4" fill="url(#wave)"/>
    <rect x="236" y="140" width="14" height="120" rx="4" fill="url(#wave)"/>
    <rect x="260" y="162" width="14" height="76"  rx="4" fill="url(#wave)"/>
    <rect x="284" y="148" width="15" height="104" rx="4" fill="url(#wave)"/>
    <rect x="310" y="168" width="15" height="64"  rx="4" fill="url(#wave)"/>
    <rect x="336" y="144" width="15" height="112" rx="4" fill="url(#wave)"/>
    <rect x="363" y="160" width="14" height="80"  rx="4" fill="url(#wave)" opacity="0.6"/>
  </g>

  <!-- Center baseline -->
  <line x1="30" y1="200" x2="370" y2="200" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Label -->
  <text x="200" y="360" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="13" font-weight="600" letter-spacing="4" fill="white" opacity="0.5">SLOWED + REVERB</text>
</svg>
